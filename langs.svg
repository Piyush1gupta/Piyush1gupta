<svg width="440" height="210" viewBox="0 0 440 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Piyush Kumar most used languages">
<title>Most Used Languages - Piyush Kumar</title>
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#000000"/><stop offset="100%" stop-color="#0b1530"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2f8dff"/><stop offset="100%" stop-color="#1e4fd6"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2f8dff"/><stop offset="100%" stop-color="#1e4fd6"/>
  </linearGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  .slideIn { opacity: 0; animation: slideInA 0.6s ease forwards; }
  @keyframes slideInA { from { opacity:0; transform: translateX(-16px);} to { opacity:1; transform: translateX(0);} }
  .popIn { opacity: 0; animation: popA 0.55s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes popA { 0%{opacity:0; transform:scale(.4);} 70%{opacity:1; transform:scale(1.08);} 100%{opacity:1; transform:scale(1);} }
  .fadeIn { opacity: 0; animation: fadeA 0.7s ease forwards; }
  @keyframes fadeA { to { opacity:1; } }
</style>
<rect x="1" y="1" width="438" height="208" rx="16" fill="url(#bgGrad)" stroke="#20335f" stroke-width="1.4"/>
<text x="24" y="34" font-family="Verdana, Geneva, sans-serif" font-size="16" font-weight="700" fill="#eaf2ff" class="fadeIn">Most Used Languages</text>

    <g transform="translate(24,56)">
      <text y="-6" font-family="Verdana, sans-serif" font-size="12.5" fill="#a9c0e6">JavaScript</text>
      <text x="300" y="-6" text-anchor="end" font-family="Verdana, sans-serif" font-size="11.5" fill="#5b78a8">38%</text>
      <rect y="0" width="300" height="8" rx="4" fill="#101d3d"/>
      <rect y="0" width="0" height="8" rx="4" fill="#f1e05a">
        <animate attributeName="width" values="0;114.0" dur="1.2s" begin="0.40s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
    <g transform="translate(24,86)">
      <text y="-6" font-family="Verdana, sans-serif" font-size="12.5" fill="#a9c0e6">HTML</text>
      <text x="300" y="-6" text-anchor="end" font-family="Verdana, sans-serif" font-size="11.5" fill="#5b78a8">22%</text>
      <rect y="0" width="300" height="8" rx="4" fill="#101d3d"/>
      <rect y="0" width="0" height="8" rx="4" fill="#2f8dff">
        <animate attributeName="width" values="0;66.0" dur="1.2s" begin="0.55s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
    <g transform="translate(24,116)">
      <text y="-6" font-family="Verdana, sans-serif" font-size="12.5" fill="#a9c0e6">CSS</text>
      <text x="300" y="-6" text-anchor="end" font-family="Verdana, sans-serif" font-size="11.5" fill="#5b78a8">18%</text>
      <rect y="0" width="300" height="8" rx="4" fill="#101d3d"/>
      <rect y="0" width="0" height="8" rx="4" fill="#1e4fd6">
        <animate attributeName="width" values="0;54.0" dur="1.2s" begin="0.70s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
    <g transform="translate(24,146)">
      <text y="-6" font-family="Verdana, sans-serif" font-size="12.5" fill="#a9c0e6">C++</text>
      <text x="300" y="-6" text-anchor="end" font-family="Verdana, sans-serif" font-size="11.5" fill="#5b78a8">12%</text>
      <rect y="0" width="300" height="8" rx="4" fill="#101d3d"/>
      <rect y="0" width="0" height="8" rx="4" fill="#f34b7d">
        <animate attributeName="width" values="0;36.0" dur="1.2s" begin="0.85s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
    <g transform="translate(24,176)">
      <text y="-6" font-family="Verdana, sans-serif" font-size="12.5" fill="#a9c0e6">C</text>
      <text x="300" y="-6" text-anchor="end" font-family="Verdana, sans-serif" font-size="11.5" fill="#5b78a8">10%</text>
      <rect y="0" width="300" height="8" rx="4" fill="#101d3d"/>
      <rect y="0" width="0" height="8" rx="4" fill="#a9c0e6">
        <animate attributeName="width" values="0;30.0" dur="1.2s" begin="1.00s" fill="freeze"
          calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
      </rect>
    </g>
</svg>