<svg width="440" height="190" viewBox="0 0 440 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Piyush Kumar GitHub stats">
<title>GitHub Stats - Piyush Kumar</title>
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#000000"/><stop offset="100%" stop-color="#0b1530"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2f8dff"/><stop offset="100%" stop-color="#1e4fd6"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2f8dff"/><stop offset="100%" stop-color="#1e4fd6"/>
  </linearGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  .slideIn { opacity: 0; animation: slideInA 0.6s ease forwards; }
  @keyframes slideInA { from { opacity:0; transform: translateX(-16px);} to { opacity:1; transform: translateX(0);} }
  .popIn { opacity: 0; animation: popA 0.55s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes popA { 0%{opacity:0; transform:scale(.4);} 70%{opacity:1; transform:scale(1.08);} 100%{opacity:1; transform:scale(1);} }
  .fadeIn { opacity: 0; animation: fadeA 0.7s ease forwards; }
  @keyframes fadeA { to { opacity:1; } }
</style>
<rect x="1" y="1" width="438" height="188" rx="16" fill="url(#bgGrad)" stroke="#20335f" stroke-width="1.4"/>
<text x="24" y="34" font-family="Verdana, Geneva, sans-serif" font-size="16" font-weight="700" fill="#eaf2ff" class="fadeIn">GitHub Stats</text>

    <g transform="translate(24,58)">
    <g class="slideIn" style="animation-delay:0.50s">
      <circle cx="0" cy="-5" r="3.4" fill="url(#barGrad)"/>
      <text x="14" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#a9c0e6">Total Stars</text>
      <text x="255" y="0" text-anchor="end" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#eaf2ff">128</text>
    </g>
    </g>
    <g transform="translate(24,84)">
    <g class="slideIn" style="animation-delay:0.65s">
      <circle cx="0" cy="-5" r="3.4" fill="url(#barGrad)"/>
      <text x="14" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#a9c0e6">Total Commits (2026)</text>
      <text x="255" y="0" text-anchor="end" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#eaf2ff">940</text>
    </g>
    </g>
    <g transform="translate(24,110)">
    <g class="slideIn" style="animation-delay:0.80s">
      <circle cx="0" cy="-5" r="3.4" fill="url(#barGrad)"/>
      <text x="14" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#a9c0e6">Total PRs</text>
      <text x="255" y="0" text-anchor="end" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#eaf2ff">47</text>
    </g>
    </g>
    <g transform="translate(24,136)">
    <g class="slideIn" style="animation-delay:0.95s">
      <circle cx="0" cy="-5" r="3.4" fill="url(#barGrad)"/>
      <text x="14" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#a9c0e6">Total Issues</text>
      <text x="255" y="0" text-anchor="end" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#eaf2ff">23</text>
    </g>
    </g>
    <g transform="translate(24,162)">
    <g class="slideIn" style="animation-delay:1.10s">
      <circle cx="0" cy="-5" r="3.4" fill="url(#barGrad)"/>
      <text x="14" y="0" font-family="Verdana, sans-serif" font-size="13" fill="#a9c0e6">Contributed to</text>
      <text x="255" y="0" text-anchor="end" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#eaf2ff">9</text>
    </g>
    </g>
<g transform="translate(342,101.0)">
  <circle r="42" fill="none" stroke="#101d3d" stroke-width="9"/>
  <circle r="42" fill="none" stroke="url(#ringGrad)" stroke-width="9" stroke-linecap="round"
    stroke-dasharray="263.9" stroke-dashoffset="263.9" filter="url(#glow)"
    transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" from="263.9" to="58.1"
      dur="1.6s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/>
  </circle>
  <text x="0" y="-2" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="700" fill="#eaf2ff" class="fadeIn" style="animation-delay:1.6s">A+</text>
  <text x="0" y="16" text-anchor="middle" font-family="Verdana, sans-serif" font-size="9.5" fill="#5b78a8" class="fadeIn" style="animation-delay:1.6s">RANK</text>
</g>
</svg>