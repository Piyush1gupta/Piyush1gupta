name: Update GitHub Stats Cards

# Requires a repo secret named PAT_GITHUB: a classic Personal Access Token
# with the `read:user` scope (Settings -> Developer settings -> Personal
# access tokens). The default GITHUB_TOKEN cannot read personal
# contribution/follower data via the GraphQL `viewer`/`user` fields for
# this purpose, so a PAT is required — same reason self-hosted
# github-readme-stats deployments need one.

on:
  schedule:
    # Runs once a day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate stat cards from live GitHub data
        env:
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          GITHUB_USER: Piyush1gupta
        run: python scripts/update_stats.py

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg langs.svg trophies.svg streak.svg
          git diff --cached --quiet || git commit -m "chore: refresh live stat cards"
          git push
